{% extends "base.html" %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 2; padding: 2rem;">
    <div class="admin-form">
        <h2 style="text-align: center; margin-bottom: 2rem; color: #333;">
            <i class="fas fa-lock"></i> Login Admin
        </h2>
        
        {% if erro %}
        <div style="background: #ff4757; color: white; padding: 10px; border-radius: 8px; margin-bottom: 1rem; text-align: center;">
            {{ erro }}
        </div>
        {% endif %}
        
        <form method="POST">
            <input type="text" name="username" placeholder="Usuário" required>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit" class="btn">Entrar</button>
        </form>
        
        <p style="text-align: center; margin-top: 1rem; color: #666; font-size: 0.9rem;">
            Padrão: admin / admin123
        </p>
    </div>
</div>

<style>
    .admin-form {
        background: rgba(255, 255, 255, 0.95);
        max-width: 400px;
        width: 100%;
        margin: 0 auto;
        padding: 2rem;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }
    
    .admin-form input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
    }
    
    .admin-form button {
        width: 100%;
        margin-top: 1rem;
    }
</style>
{% endblock %}
